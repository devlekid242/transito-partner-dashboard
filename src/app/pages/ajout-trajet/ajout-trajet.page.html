<main class="flex-1 p-container-margin p-4 overflow-y-auto">
  <div class="max-w-4xl mx-auto">
    <div class="bg-card-bg rounded-xl shadow-ambient p-6 md:p-8 border border-border-subtle">
      <div class="mb-8 border-b border-border-subtle pb-4">
        <h3 class="font-headline-md text-headline-md text-on-surface">{{ pageTitle }}</h3>
        <p class="font-body-md text-body-md text-on-surface-variant mt-1">
          Planifiez un trajet pour votre agence et modifiez les détails existants.
        </p>
      </div>
      <div
        *ngIf="isSubmitting"
        class="mb-4 flex items-center gap-2 text-primary text-sm font-medium"
      >
        <span class="material-symbols-outlined animate-spin">progress_activity</span>
        Traitement du trajet...
      </div>
      <app-form
        [fields]="tripFormFields"
        [submitLabel]="submitLabel"
        (submit)="onFormSubmit($event)"
      ></app-form>
    </div>

    <div
      class="mt-6 bg-surface-container-low rounded-xl border border-outline-variant p-4 flex items-start gap-4"
    >
      <div
        class="w-10 h-10 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center shrink-0"
      >
        <span class="material-symbols-outlined">info</span>
      </div>
      <div>
        <h4 class="font-label-sm text-label-sm text-on-surface">Rappel de Planification</h4>
        <p class="font-body-md text-body-md text-on-surface-variant mt-1 text-sm">
          Assurez-vous que le bus et les points d'embarquement appartiennent à votre agence.
        </p>
      </div>
    </div>
  </div>

  <app-notification
    [show]="showNotification"
    [type]="notificationType"
    [message]="notificationMessage"
    [duration]="5000"
  ></app-notification>
</main>
