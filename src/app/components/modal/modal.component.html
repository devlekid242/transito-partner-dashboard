<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-on-surface/40 backdrop-blur-sm" (click)="onClose()"></div>

  <!-- Modal Dialog -->
  <div class="relative w-full bg-card-bg rounded-xl shadow-lg border border-border-subtle overflow-hidden {{ sizeClasses }}">
    <!-- Modal Header -->
    <div class="px-6 py-4 border-b border-border-subtle flex justify-between items-center bg-surface-bg">
      <h2 class="font-headline-md text-headline-md text-on-surface font-bold">{{ title }}</h2>
      <button class="text-outline hover:text-on-surface transition-colors" (click)="onClose()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <!-- Modal Body -->
    <div class="p-6">
      <ng-content></ng-content>
    </div>

    <!-- Modal Footer -->
    <div class="px-6 py-4 border-t border-border-subtle bg-surface-bg flex justify-end gap-3">
      <ng-content select="[footer]"></ng-content>
    </div>
  </div>
</div>
