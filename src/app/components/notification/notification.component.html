<div *ngIf="show" class="fixed top-4 right-4 z-50">
  <div class="flex items-center gap-3 p-4 rounded-lg border-l-4 {{ typeClasses }} shadow-lg animate-slide-in">
    <span class="material-symbols-outlined text-[20px]">{{ icon }}</span>
    <p class="font-body-md text-body-md">{{ message }}</p>
    <button class="text-outline hover:text-on-surface transition-colors" (click)="show = false">
      <span class="material-symbols-outlined text-[18px]">close</span>
    </button>
  </div>
</div>
