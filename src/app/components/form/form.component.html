<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
  <div *ngFor="let field of fields" class="space-y-2">
    <label [for]="field.key" class="block font-label-sm text-label-sm text-on-surface">
      {{ field.label }} <span *ngIf="field.required" class="text-danger-red">*</span>
    </label>

    <div *ngIf="field.type === 'textarea'" class="relative">
      <textarea
        [id]="field.key"
        [formControlName]="field.key"
        [placeholder]="field.placeholder"
        [rows]="field.rows || 3"
        class="w-full px-4 py-2 bg-surface border border-border-subtle rounded-lg font-body-md text-body-md text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all resize-none"
      ></textarea>
    </div>

    <div *ngIf="field.type === 'select'" class="relative">
      <select
        [id]="field.key"
        [formControlName]="field.key"
        [multiple]="field.multiple"
        class="w-full appearance-none px-4 py-2 bg-surface border border-border-subtle rounded-lg font-body-md text-body-md text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all"
      >
        <option *ngFor="let option of field.options" [value]="option.value">
          {{ option.label }}
        </option>
      </select>
      <span
        class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-outline"
      >
        <span class="material-symbols-outlined">expand_more</span>
      </span>
    </div>

    <div *ngIf="field.type === 'checkbox'" class="flex items-center">
      <input
        [id]="field.key"
        [formControlName]="field.key"
        type="checkbox"
        class="h-4 w-4 rounded border-border-subtle text-primary focus:ring-primary bg-surface shadow-sm"
      />
      <label [for]="field.key" class="ml-2 block font-body-md text-body-md text-on-surface-variant">
        {{ field.label }}
      </label>
    </div>

    <div
      *ngIf="field.type !== 'textarea' && field.type !== 'select' && field.type !== 'checkbox'"
      class="relative"
    >
      <input
        [id]="field.key"
        [formControlName]="field.key"
        [type]="getFieldType(field)"
        [placeholder]="field.placeholder"
        class="w-full pl-4 pr-4 py-2 bg-surface border border-border-subtle rounded-lg font-body-md text-body-md text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all"
      />
    </div>

    <div
      *ngIf="
        form.get(field.key)?.invalid && (form.get(field.key)?.dirty || form.get(field.key)?.touched)
      "
      class="text-danger-red font-label-sm text-xs mt-1"
    >
      <div *ngIf="form.get(field.key)?.errors?.['required']">Ce champ est obligatoire.</div>
      <div *ngIf="form.get(field.key)?.errors?.['email']">
        Veuillez entrer une adresse email valide.
      </div>
    </div>
  </div>

  <div
    *ngIf="errorMessage"
    class="p-3 bg-danger-red/10 text-danger-red rounded-lg font-body-md text-body-md"
  >
    {{ errorMessage }}
  </div>

  <button
    type="submit"
    [disabled]="IsSubmit || form.invalid"
    class="w-full flex cursor-pointer justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-md hover:shadow-lg font-label-sm text-label-sm text-on-primary bg-primary hover:bg-primary-fixed-variant focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200"
  >
    @if (IsSubmit) {
      <svg
        class="animate-spin h-8 w-8 text-white mr-3 cursor-wait"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
      >
        <circle
          class="opacity-25"
          cx="12"
          cy="12"
          r="10"
          stroke="currentColor"
          stroke-width="4"
        ></circle>
        <path
          class="opacity-75"
          fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
        ></path>
      </svg>
      Connexion en cours...
    } @else {
      {{ submitLabel }}
    }
  </button>
</form>
