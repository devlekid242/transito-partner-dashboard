<div class="bg-card-bg rounded-xl shadow-sm border border-border-subtle overflow-hidden">
  <!-- Table Header -->
  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-surface-bright border-b border-border-subtle">
          <th *ngFor="let column of columns"
              class="p-3 font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider font-semibold cursor-pointer"
              [class.hover:text-primary]="column.sortable"
              (click)="column.sortable ? onSort(column.key) : null">
            <div class="flex items-center gap-1">
              {{ column.title }}
              <span *ngIf="column.sortable && sortKey === column.key" class="material-symbols-outlined text-sm">
                {{ sortDirection === 'asc' ? 'arrow_upward' : 'arrow_downward' }}
              </span>
            </div>
          </th>
          <th *ngIf="actions.length > 0" class="p-3 font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider font-semibold text-right">
            Actions
          </th>
        </tr>
      </thead>
      <tbody class="divide-y divide-border-subtle">
        <tr *ngFor="let item of paginatedData" class="hover:bg-surface-container-low transition-colors">
          <td *ngFor="let column of columns" class="p-3 font-body-md text-body-md text-on-surface">
            {{ item[column.key] }}
          </td>
          <td *ngIf="actions.length > 0" class="p-3 text-right">
            <div class="flex justify-end gap-2">
              <button *ngFor="let action of actions"
                      class="text-on-surface-variant hover:text-primary transition-colors p-1"
                      [attr.title]="action.label"
                      (click)="onActionClick(action, item)">
                <span class="material-symbols-outlined text-base">{{ action.icon }}</span>
              </button>
            </div>
          </td>
        </tr>
        <tr *ngIf="paginatedData.length === 0">
          <td [attr.colspan]="columns.length + (actions.length > 0 ? 1 : 0)" class="p-6 text-center text-on-surface-variant">
            Aucune donnée disponible
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div *ngIf="totalPages > 1" class="p-4 border-t border-border-subtle bg-surface-container-lowest flex justify-between items-center">
    <span class="font-label-sm text-label-sm text-outline">Page {{ currentPage }} sur {{ totalPages }}</span>
    <div class="flex gap-1">
      <button class="w-8 h-8 flex items-center justify-center rounded border border-border-subtle text-outline hover:bg-surface-bg disabled:opacity-50"
              [disabled]="currentPage === 1"
              (click)="onPageChange(currentPage - 1)">
        <span class="material-symbols-outlined text-[18px]">chevron_left</span>
      </button>
      <button *ngFor="let page of [1, 2, 3, 4, 5].slice(0, totalPages)"
              class="w-8 h-8 flex items-center justify-center rounded border border-border-subtle text-on-surface hover:bg-surface-bg font-label-sm"
              [class.bg-primary]="currentPage === page"
              [class.text-on-primary]="currentPage === page"
              (click)="onPageChange(page)">
        {{ page }}
      </button>
      <button class="w-8 h-8 flex items-center justify-center rounded border border-border-subtle text-outline hover:bg-surface-bg"
              [disabled]="currentPage === totalPages"
              (click)="onPageChange(currentPage + 1)">
        <span class="material-symbols-outlined text-[18px]">chevron_right</span>
      </button>
    </div>
  </div>
</div>
